name: Automate Dashboard Data Update

on:
  repository_dispatch:
    types: [update_point]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run Update Script
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/update_data.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Dashboard Automation"
          git config --global user.email "automation@dashboard.local"
          git add dashboard_data.json
          git add img/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit. Everything is up to date."
          else
            git commit -m "auto: Dashboard updated via Power Automate response"
            git push
            echo "Changes pushed successfully! Vercel will now deploy."
          fi
