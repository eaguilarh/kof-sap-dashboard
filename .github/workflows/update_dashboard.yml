name: Automate Dashboard Data Update

on:
  repository_dispatch:
    types: [update_point]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Update Script
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node scripts/update_data.js
          node encode.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Dashboard Automation"
          git config --global user.email "automation@dashboard.local"
          git add dashboard_data.json
          git add img/
          git add js/image-data.js
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit. Everything is up to date."
          else
            git commit -m "auto: Dashboard updated via Power Automate response"
            git push
            echo "Changes pushed successfully! Vercel will now deploy."
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "La automatización falló. Configura aquí tu webhook de Teams o Slack."
          # curl -H 'Content-Type: application/json' -d '{"text": "Alerta: Error en la automatización del KOF SAP Dashboard"}' <WEBHOOK_URL>
